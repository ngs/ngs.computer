name: Check Actions Versions

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/workflows/**"
  schedule:
    # Run weekly on Monday at 10:00 JST (01:00 UTC)
    - cron: "0 1 * * 1"
  workflow_dispatch:

# version-updater calls the workflow-list API, so actions: read is required
# (this repo's GITHUB_TOKEN defaults to read-only).
permissions:
  contents: read
  actions: read

jobs:
  check-versions:
    name: Check Outdated Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Check for outdated actions
        id: check
        uses: saadmk11/github-actions-version-updater@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip_pull_request: "true"

      - name: Report outdated actions
        if: steps.check.outputs.updated_count > 0
        run: |
          echo "::warning::Found ${{ steps.check.outputs.updated_count }} outdated GitHub Actions"
          echo "Run Dependabot or manually update the actions."
          echo ""
          echo "Outdated actions detected. Please update them."
          exit 1

      - name: All actions up to date
        if: steps.check.outputs.updated_count == 0
        run: echo "All GitHub Actions are up to date!"
